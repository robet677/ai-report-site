<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Personal Growth Report</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e8eef4;
      --muted: #8b9cb3;
      --accent: #5b8def;
      --accent-hover: #7aa3f5;
      --success: #3ecf8e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      flex: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 3rem;
      width: 100%;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.75rem;
      line-height: 1.2;
      background: linear-gradient(135deg, #e8eef4 0%, #a8c4f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin: 0 0 2rem;
    }

    .price-tag {
      display: inline-flex;
      align-items: baseline;
      gap: 0.35rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.65rem 1rem;
      margin-bottom: 1.75rem;
    }

    .price-tag span:first-child {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .price-tag .amount {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--success);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="date"],
    input[type="email"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 141, 239, 0.2);
    }

    input::placeholder {
      color: #5c6b80;
    }

    .paypal-row {
      margin-top: 0.5rem;
    }

    .btn-paypal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.9rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(180deg, #0070ba 0%, #003087 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(0, 112, 186, 0.35);
    }

    .btn-paypal:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 112, 186, 0.45);
    }

    .note {
      margin-top: 1.25rem;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
    }

    footer {
      margin-top: auto;
      padding: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Discover Your Unique Growth Path</h1>
    <p class="subtitle">Personalized AI-powered analysis based on your birth data</p>

    <div class="price-tag">
      <span>One report</span>
      <span class="amount">$9.9</span>
    </div>

    <form action="#" method="get" onsubmit="return false;">
      <div>
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Your full name" autocomplete="name" />
      </div>
      <div>
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" />
      </div>
      <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
      </div>
    </form>

    <div class="paypal-row">
      <a class="btn-paypal" href="https://paypal.me/YuyunTech/9.9" target="_blank" rel="noopener noreferrer">Pay with PayPal — $9.9</a>
    </div>

    <p class="note">The report will be sent to your email within 24 hours.</p>
  </div>

  <footer>
    四平钰云科技 Siping Yuyun Technology Co.,Ltd.
  </footer>
</body>
</html>
